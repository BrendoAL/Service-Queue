spring:
  application:
    name: queue-system

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: ${JWT_EXPIRATION_MS:28800000}

management:
  endpoints:
    web:
      exposure:
        include: health

queue:
  cors:
    allowed-origin-patterns: ${QUEUE_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:4200}
  websocket:
    allowed-origin-patterns: ${QUEUE_WEBSOCKET_ALLOWED_ORIGIN_PATTERNS:${QUEUE_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:4200}}
