services:
  mysql:
    image: mysql:8.0
    container_name: queue-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: queue_db
      MYSQL_USER: queue_user
      MYSQL_PASSWORD: queue_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpass"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: queue-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/queue_db
      SPRING_DATASOURCE_USERNAME: queue_user
      SPRING_DATASOURCE_PASSWORD: queue_pass
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: 28800000

volumes:
  mysql_data:
