extensions:
  sigv4auth:
    region: us-east-2
    service: aps

receivers:
  prometheus:
    config:
      scrape_configs:
        - job_name: queue-backend
          scrape_interval: 30s
          metrics_path: /actuator/prometheus
          static_configs:
            - targets:
                - 127.0.0.1:8080

exporters:
  prometheusremotewrite:
    endpoint: https://aps-workspaces.us-east-2.amazonaws.com/workspaces/SEU_WORKSPACE_ID/api/v1/remote_write
    auth:
      authenticator: sigv4auth

service:
  extensions:
    - sigv4auth
  pipelines:
    metrics:
      receivers:
        - prometheus
      exporters:
        - prometheusremotewrite
